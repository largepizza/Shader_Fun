name: Release

# Fires on any tag matching v1.2.3 — create one with:
#   git tag v1.0.0 && git push origin v1.0.0
# Can also be triggered manually from the Actions tab.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          $v = (Get-Content VERSION).Trim()
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "archive=SAT_LIGHT_SIM_v${v}_Windows" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader, SPIRV-Tools, Glslang
          vulkan-use-cache: true

      - name: Configure
        run: cmake -B build-release -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-release --config Release --parallel

      - name: Package
        run: |
          $v   = "${{ steps.ver.outputs.version }}"
          $vu  = $v -replace '\.','_'
          $exe = "SAT_LIGHT_SIM_V_${vu}.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build-release/Release/$exe"                   dist/
          Copy-Item build-release/Release/shaders                  dist/ -Recurse
          Copy-Item build-release/Release/assets                   dist/ -Recurse
          Copy-Item data/constellations.json        dist/
          Copy-Item data/constellations.schema.json dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ steps.ver.outputs.archive }}.zip" -Force
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.archive }}
          path: ${{ steps.ver.outputs.archive }}.zip

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          v=$(cat VERSION | tr -d '[:space:]')
          echo "version=$v"              >> $GITHUB_OUTPUT
          echo "archive=SAT_LIGHT_SIM_v${v}_Linux" >> $GITHUB_OUTPUT

      - name: Install Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader, SPIRV-Tools, Glslang
          vulkan-use-cache: true

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libx11-dev libxkbcommon-dev libwayland-dev wayland-protocols \
            ninja-build

      - name: Configure
        run: cmake -B build-release -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build-release --parallel

      - name: Package
        run: |
          v="${{ steps.ver.outputs.version }}"
          vu="${v//./_}"
          exe="SAT_LIGHT_SIM_V_${vu}"
          mkdir dist
          cp "build-release/$exe"                     dist/
          cp -r build-release/shaders                 dist/
          cp -r build-release/assets                  dist/
          cp data/constellations.json        dist/
          cp data/constellations.schema.json dist/
          tar -czf "${{ steps.ver.outputs.archive }}.tar.gz" -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.archive }}
          path: ${{ steps.ver.outputs.archive }}.tar.gz

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          v=$(cat VERSION | tr -d '[:space:]')
          echo "version=$v"              >> $GITHUB_OUTPUT
          echo "archive=SAT_LIGHT_SIM_v${v}_macOS" >> $GITHUB_OUTPUT

      - name: Install Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader, SPIRV-Tools, Glslang
          vulkan-use-cache: true

      - name: Configure
        run: cmake -B build-release -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-release --parallel

      - name: Package
        run: |
          v="${{ steps.ver.outputs.version }}"
          vu="${v//./_}"
          exe="SAT_LIGHT_SIM_V_${vu}"
          mkdir dist
          cp "build-release/$exe"                     dist/
          cp -r build-release/shaders                 dist/
          cp -r build-release/assets                  dist/
          cp data/constellations.json        dist/
          cp data/constellations.schema.json dist/
          tar -czf "${{ steps.ver.outputs.archive }}.tar.gz" -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.archive }}
          path: ${{ steps.ver.outputs.archive }}.tar.gz

  # ── GitHub Release (attaches all three archives) ───────────────────────────
  publish:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
